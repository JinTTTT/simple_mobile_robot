fastslam_node:
  ros__parameters:
    num_particles: 20
    scan_beam_step: 10
    likelihood_max_distance: 0.5
    likelihood_sigma: 0.30

    map_resolution: 0.05
    map_width: 500
    map_height: 500

    translation_noise_from_translation: 0.03
    translation_noise_from_rotation: 0.005
    translation_noise_base: 0.003
    rotation_noise_from_rotation: 0.03
    rotation_noise_from_translation: 0.01
    rotation_noise_base: 0.003

    min_translation_for_update: 0.10
    min_rotation_for_update: 0.08
    resample_min_eff_ratio: 0.2
