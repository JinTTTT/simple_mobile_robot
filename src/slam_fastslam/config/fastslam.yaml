fastslam_node:
  ros__parameters:
    num_particles: 20
    scan_beam_step: 10
    likelihood_max_distance: 0.5
    likelihood_sigma: 0.15

    map_resolution: 0.05
    map_width: 500
    map_height: 500

    translation_noise_from_translation: 0.05
    translation_noise_from_rotation: 0.01
    translation_noise_base: 0.005
    rotation_noise_from_rotation: 0.05
    rotation_noise_from_translation: 0.02
    rotation_noise_base: 0.005

    min_translation_for_update: 0.10
    min_rotation_for_update: 0.08
